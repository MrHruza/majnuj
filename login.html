<section class="login-section">
    <div class="login-container">
        
        <div class="login-logo-wrapper">
            <img src="https://github.com/user-attachments/assets/a9ccd4a1-d413-4bf6-add4-5685f5153ea8" alt="GameRealms Logo" class="login-logo">
        </div>

        <h1 class="login-title">Přihlášení na web</h1>
        <p class="login-subtitle">Přihlaš se pomocí stejných údajů jako ve hře.</p>
        
        <div class="login-info-box">
            <span class="info-icon">ℹ</span>
            <p>Ještě nemáš účet? Připoj se na server <strong>majnuj.eu</strong> a napiš do chatu: <br><code class="cmd-highlight">/register [heslo] [heslo]</code></p>
        </div>

        <form class="login-form" action="/login" method="POST">
            
            <div class="input-group">
                <input type="text" id="minecraft-nick" name="username" required placeholder=" ">
                <label for="minecraft-nick">Minecraft nick</label>
            </div>

            <div class="input-group">
                <input type="password" id="minecraft-password" name="password" required placeholder=" ">
                <label for="minecraft-password">Heslo</label>
                <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
            </div>

            <div class="login-options">
                <label class="remember-me">
                    <input type="checkbox" name="remember">
                    <span class="checkmark"></span>
                    Zůstat přihlášen
                </label>
                <a href="#zapomenute-heslo" class="forgot-password">Zapomněl jsi heslo?</a>
            </div>

            <button type="submit" class="btn-login-submit">Přihlásit se</button>
            
        </form>
    </div>
</section>

<script>
    function togglePasswordVisibility() {
        const passwordInput = document.getElementById('minecraft-password');
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
    }
</script>
