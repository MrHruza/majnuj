<section class="gr-login-section">
    <div class="gr-login-box">
        
        <div class="gr-logo-container">
            <img src="https://github.com/user-attachments/assets/a9ccd4a1-d413-4bf6-add4-5685f5153ea8" alt="GameRealms Logo" class="gr-logo-img">
        </div>

        <h2 class="gr-login-title">Přihlášení na web</h2>
        <p class="gr-login-subtitle">Přihlaš se pomocí stejných údajů jako ve hře</p>

        <form class="gr-form" action="/login" method="POST">
            
            <div class="gr-input-wrapper">
                <input type="text" id="gr-nick" name="username" required placeholder="Minecraft nick">
            </div>

            <div class="gr-input-wrapper input-password-wrapper">
                <input type="password" id="gr-pass" name="password" required placeholder="Heslo">
                <button type="button" class="gr-password-toggle" onclick="togglePassword()" aria-label="Zobrazit heslo">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
            </div>

            <div class="gr-forgot-row">
                <a href="#zapomenute-heslo" class="gr-link-forgot">Zapomněl jsi heslo?</a>
            </div>

            <div class="gr-bottom-row">
                <label class="gr-checkbox-label">
                    <input type="checkbox" name="remember">
                    <span class="gr-custom-checkbox"></span>
                    Zůstat přihlášen
                </label>
            </div>

            <button type="submit" class="gr-btn-submit">Přihlásit se</button>

        </form>
    </div>
</section>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('gr-pass');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
        } else {
            passwordInput.type = 'password';
        }
    }
</script>
